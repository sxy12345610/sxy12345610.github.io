<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的平行身份</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fdf6e3 0%, #fce4ec 50%, #e8f5e9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 320px;
            width: 100%;
        }
        .emoji {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px 20px;
            color: white;
            margin-bottom: 20px;
        }
        .id {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        .job {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .name {
            font-size: 18px;
            opacity: 0.9;
        }
        .footer {
            font-size: 12px;
            color: #8d7a9e;
            margin-top: 20px;
        }
        .logo {
            margin-top: 30px;
            font-size: 14px;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🌟</div>
        <div class="header">
            <div class="id" id="identity-id">ID: --</div>
            <div class="job" id="identity-job">加载中...</div>
            <div class="name" id="identity-name"></div>
        </div>
        <div class="footer">平行世界情绪驿站 · 专属身份</div>
    </div>
    <div class="logo">🌌 平行世界情绪驿站</div>

    <script>
        // 从URL参数获取身份信息
        function getUrlParams() {
            const params = {};
            const urlParams = new URLSearchParams(window.location.search);
            urlParams.forEach((value, key) => {
                params[key] = decodeURIComponent(value);
            });
            return params;
        }

        // 显示身份信息
        function displayIdentity() {
            const params = getUrlParams();
            const nickname = params.nickname || '匿名';
            const job = params.job || '神秘旅人';
            const id = params.id || '----';

            document.getElementById('identity-id').textContent = 'ID: ' + id;
            document.getElementById('identity-job').textContent = job;
            document.getElementById('identity-name').textContent = nickname;
        }

        // 页面加载完成后显示身份信息
        document.addEventListener('DOMContentLoaded', displayIdentity);
    </script>
</body>
</html>
