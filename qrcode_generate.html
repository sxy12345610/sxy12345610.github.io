<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成二维码 - 平行世界情绪驿站</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fdf6e3 0%, #fce4ec 50%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #5d4e6d;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #8d7a9e;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .qrcode-container {
            margin: 20px 0;
        }
        #qrcode {
            display: inline-block;
            padding: 15px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .url-display {
            background: rgba(102, 126, 234, 0.1);
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            color: #667eea;
            word-break: break-all;
            margin: 20px 0;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .tips {
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
        }
        .tips-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }
        canvas {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 平行世界情绪驿站</h1>
        <p>扫码访问心理健康网页</p>
        
        <div class="qrcode-container">
            <canvas id="qrcode"></canvas>
        </div>
        
        <div class="url-display" id="url-display"></div>
        
        <div class="btn-group">
            <button class="btn" onclick="copyUrl()">📋 复制链接</button>
            <button class="btn btn-secondary" onclick="downloadQR()">💾 保存二维码</button>
        </div>
        
        <div class="tips">
            <div class="tips-title">💡 使用提示：</div>
            <p>1. 使用手机微信或浏览器扫码即可访问</p>
            <p>2. 支持手机、平板、电脑多端访问</p>
            <p>3. 如果扫码失败，请点击"复制链接"手动粘贴到浏览器</p>
            <p>4. 确保手机和电脑连接同一 WiFi 网络</p>
        </div>
    </div>

    <script>
        // 获取当前页面 URL（去掉 qrcode_generate.html 部分）
        const currentUrl = window.location.href;
        const baseUrl = currentUrl.replace('qrcode_generate.html', 'index.html');
        
        // 显示 URL
        document.getElementById('url-display').textContent = baseUrl;
        
        // 生成二维码
        const canvas = document.getElementById('qrcode');
        QRCode.toCanvas(canvas, baseUrl, {
            width: 256,
            margin: 2,
            color: {
                dark: '#5d4e6d',
                light: '#ffffff'
            }
        }, function (error) {
            if (error) {
                console.error('二维码生成失败:', error);
                alert('二维码生成失败，请刷新页面重试');
            }
        });
        
        // 复制链接
        function copyUrl() {
            navigator.clipboard.writeText(baseUrl).then(() => {
                alert('✅ 链接已复制到剪贴板');
            }).catch(err => {
                console.error('复制失败:', err);
                // 备用方案
                const textArea = document.createElement('textarea');
                textArea.value = baseUrl;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert('✅ 链接已复制到剪贴板');
                } catch (e) {
                    alert('复制失败，请手动复制');
                }
                document.body.removeChild(textArea);
            });
        }
        
        // 下载二维码
        function downloadQR() {
            try {
                const link = document.createElement('a');
                link.download = '平行世界情绪驿站_二维码.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                alert('✅ 二维码已保存');
            } catch (e) {
                console.error('保存失败:', e);
                alert('保存失败，请截图保存');
            }
        }
    </script>
</body>
</html>
