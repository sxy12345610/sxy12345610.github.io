<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>平行世界情绪驿站</title>
    <!-- 引入QRCode.js库用于生成二维码 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <!-- 引入html2canvas库用于生成海报图片 -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fdf6e3 0%, #fce4ec 50%, #e8f5e9 100%);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: calc(56px + env(safe-area-inset-bottom));
            -webkit-overflow-scrolling: touch;
        }
        .container { 
            max-width: 420px; 
            margin: 0 auto; 
            padding: 20px 15px calc(70px + env(safe-area-inset-bottom));
            position: relative;
            animation: pageFadeIn 0.4s ease-out;
            width: 100%;
        }
        .container.page-transition {
            animation: pageSlideOut 0.3s ease-in forwards;
        }
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pageSlideOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(-20px); }
        }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute; width: 4px; height: 4px; background: rgba(255, 182, 193, 0.5);
            border-radius: 50%; animation: float 8s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }
        .home-page { text-align: center; padding-top: 60px; }
        .home-title { font-size: 32px; font-weight: bold; color: #5d4e6d; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .home-subtitle { font-size: 16px; color: #8d7a9e; margin-bottom: 40px; }
        .start-btn {
            background: linear-gradient(135deg, #ffb7b2 0%, #ffecd2 100%);
            border: none; padding: 15px 40px; font-size: 18px; font-weight: bold;
            color: #5d4e6d; border-radius: 50px;
            box-shadow: 0 8px 25px rgba(255, 183, 178, 0.4);
            cursor: pointer; transition: all 0.3s ease; margin-top: 20px;
        }
        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255, 183, 178, 0.5); }
        .start-btn:active { transform: translateY(0); }
        .page-title { font-size: 24px; font-weight: bold; color: #5d4e6d; text-align: center; margin-bottom: 30px; }
        .emotion-page { padding-top: 30px; }
        .emotion-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .emotion-card {
            background: white; border-radius: 20px; padding: 25px 15px; text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08); cursor: pointer;
            transition: all 0.3s ease; border: 2px solid transparent;
        }
        .emotion-card:hover { 
    transform: translateY(-5px); 
    box-shadow: 0 12px 30px rgba(0,0,0,0.12); 
}
/* 情绪卡片选中动画 - 高亮+放大+阴影+弹跳 */
.emotion-card.selected { 
    border-color: #ffb7b2; 
    transform: scale(1.08);
    box-shadow: 0 15px 40px rgba(255, 183, 178, 0.5);
    animation: cardBounce 0.4s ease-out;
}
@keyframes cardBounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1.08); }
}

/* 页面加载淡入动画 */
body {
    animation: fadeIn 1s ease-out;
}
@keyframes fadeIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
}
        .emotion-icon { font-size: 40px; margin-bottom: 10px; }
        .emotion-name { font-size: 18px; font-weight: bold; color: #5d4e6d; }
        .cards-page { padding-top: 20px; }
        .cards-container { display: flex; flex-direction: column; gap: 20px; }
        .card-wrapper { 
            perspective: 1000px; 
            opacity: 0;
            transform: translateY(30px);
            animation: cardSlideIn 0.5s ease-out forwards;
        }
        .card-wrapper:nth-child(1) { animation-delay: 0.1s; }
        .card-wrapper:nth-child(2) { animation-delay: 0.2s; }
        .card-wrapper:nth-child(3) { animation-delay: 0.3s; }
        
        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card {
            width: 100%; height: 200px; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        .card.flipped { 
            transform: rotateY(180deg); 
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .card-front {
            background: white;
            transform: rotateY(180deg);
        }
        .card-sparkles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: sparkle 0.8s ease-out forwards;
            opacity: 0;
        }
        @keyframes sparkle {
            0% { 
                transform: scale(0) translateY(0); 
                opacity: 1; 
            }
            100% { 
                transform: scale(1) translateY(-50px); 
                opacity: 0; 
            }
        }
        .card-back-icon { font-size: 50px; margin-bottom: 10px; }
        .card-back-text { font-size: 16px; opacity: 0.9; }
        .card-front { background: white; transform: rotateY(180deg); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .emotion-tag { font-size: 12px; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; color: white; font-weight: bold; }
        .story-text { font-size: 15px; color: #5d4e6d; text-align: center; line-height: 1.6; margin-bottom: 15px; flex: 1; display: flex; align-items: center; }
        .challenge-box { background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); border-radius: 12px; padding: 12px; width: 100%; }
        .challenge-label { font-size: 12px; color: #8d7a9e; margin-bottom: 5px; }
        .challenge-text { font-size: 14px; color: #5d4e6d; font-weight: 500; }
        .complete-btn {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            border: none; padding: 10px 25px; border-radius: 30px;
            font-size: 14px; font-weight: bold; color: #5d4e6d;
            margin-top: 15px; cursor: pointer; transition: all 0.3s ease;
        }
        .complete-btn:hover { transform: scale(1.05); }
        .complete-btn.completed { background: linear-gradient(135deg, #c8e6c9 0%, #b2dfdb 100%); color: #66bb6a; }
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(135deg, #ffb7b2 0%, #ffecd2 100%); color: #5d4e6d; }
        .btn-secondary { background: white; color: #5d4e6d; border: 2px solid #e9ecef; }
        .btn:hover { transform: translateY(-2px); }
        .messages-wall { 
            position: fixed; 
            bottom: calc(60px + env(safe-area-inset-bottom)); 
            left: 0; 
            width: 100%; 
            height: 80px; 
            overflow: hidden; 
            pointer-events: none; 
            z-index: 100; 
        }
        .message-item {
            position: absolute; white-space: nowrap; font-size: 14px;
            color: rgba(93, 78, 109, 0.7); animation: floatMessage 15s linear infinite;
        }
        @keyframes floatMessage {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }
        .poster-page { padding-top: 20px; }
        .input-group { margin-bottom: 20px; }
        .input-label { display: block; font-size: 14px; color: #5d4e6d; margin-bottom: 8px; }
        .input-field {
            width: 100%; padding: 15px; border: 2px solid #e9ecef;
            border-radius: 12px; font-size: 16px; outline: none;
            transition: all 0.3s ease;
        }
        .input-field:focus { border-color: #ffb7b2; }
        .generate-btn {
            width: 100%; background: linear-gradient(135deg, #ffb7b2 0%, #ffecd2 100%);
            border: none; padding: 15px; border-radius: 15px;
            font-size: 18px; font-weight: bold; color: #5d4e6d;
            cursor: pointer; transition: all 0.3s ease;
        }
        .generate-btn:hover { transform: translateY(-2px); }
        .poster-card {
            background: white; border-radius: 20px; padding: 30px;
            margin-top: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .poster-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px; padding: 40px 20px; color: white;
        }
        .poster-id { font-size: 12px; opacity: 0.8; margin-bottom: 15px; }
        .poster-title { font-size: 28px; font-weight: bold; margin-bottom: 20px; }
        .poster-name { font-size: 18px; opacity: 0.9; }
        .save-btn { margin-top: 20px; background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        .stats-page { padding-top: 20px; }
        .stat-item {
            background: white; border-radius: 15px; padding: 20px;
            margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .stat-value { font-size: 36px; font-weight: bold; color: #5d4e6d; }
        .stat-label { font-size: 14px; color: #8d7a9e; margin-top: 5px; }
        .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        .confetti-piece {
            position: absolute; width: 10px; height: 10px;
            background: #ffb7b2; animation: confettiFall 2s ease-in forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .back-btn {
            position: absolute; top: 20px; left: 20px; width: 45px; height: 45px;
            background: white; border: none; border-radius: 50%; font-size: 20px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease; z-index: 10;
        }
        .back-btn:hover { transform: scale(1.1); }
        nav {
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: white;
            padding: 8px 15px calc(8px + env(safe-area-inset-bottom)); 
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08); 
            z-index: 50;
            border-radius: 15px 15px 0 0;
            height: calc(56px + env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
        }
        nav div { max-width: 420px; margin: 0 auto; display: flex; justify-content: space-around; width: 100%; }
        nav button { 
            border: none; background: none; cursor: pointer; 
            padding: 8px 12px; border-radius: 12px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; 
            align-items: center; position: relative;
        }
        nav button:hover { background: rgba(139, 92, 246, 0.05); }
        nav button.active { 
            transform: translateY(-4px);
        }
        nav button.active .nav-icon { 
            color: #8B5CF6; 
            filter: drop-shadow(0 2px 4px rgba(139, 92, 246, 0.4));
        }
        nav button.active .nav-text { 
            color: #8B5CF6; 
            font-weight: bold;
        }
        nav button.active .nav-dot { 
            opacity: 1; 
            transform: scale(1);
        }
        .nav-icon { font-size: 24px; color: #999; transition: all 0.3s ease; }
        .nav-text { 
            font-size: 11px; color: #999; margin-top: 3px; 
            transition: all 0.3s ease;
        }
        .nav-dot { 
            position: absolute; bottom: -4px; width: 6px; height: 6px; 
            background: #8B5CF6; border-radius: 50%; 
            opacity: 0; transform: scale(0);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .page-header { display: flex; align-items: center; margin-bottom: 25px; padding-top: 10px; }
        .page-header-back { width: 40px; height: 40px; background: white; border: none; border-radius: 50%; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-right: 15px; transition: all 0.3s ease; }
        .page-header-back:hover { transform: scale(1.1); }
        .page-header-title { font-size: 22px; font-weight: bold; color: #5d4e6d; }
        .progress-bar { background: #e9ecef; border-radius: 10px; height: 8px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #ffb7b2, #ffecd2); transition: width 0.5s ease; }
        .achievement { display: inline-flex; align-items: center; background: linear-gradient(135deg, #fff9c4 0%, #ffecb3 100%); padding: 5px 12px; border-radius: 20px; font-size: 12px; color: #5d4e6d; margin: 5px; }
        .achievement::before { content: '🏆'; margin-right: 5px; }
        .float-tip { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px 30px; border-radius: 15px; font-size: 16px; z-index: 1000; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .float-tip img { max-width: 200px; border-radius: 10px; margin: 10px 0; }
        .mood-bar-container {
            width: 100%;
        }
        .mood-bar {
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            background-size: 400% 100%;
            transition: all 0.3s ease;
        }
        .mood-labels {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-top: 5px;
        }
        @keyframes floatUp { 0% { transform: translateY(0) translateX(0); opacity: 1; } 100% { transform: translateY(-100vh) translateX(20px); opacity: 0; } }
        .small-action { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* 深夜模式样式 */
        body.night-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e8e8e8;
        }
        body.night-mode .home-title { color: #ffffff; }
        body.night-mode .home-subtitle { color: #c0c0c0; }
        body.night-mode .page-header-title { color: #ffffff; }
        body.night-mode .emotion-card { background: rgba(255, 255, 255, 0.1); }
        body.night-mode .emotion-card.selected { background: rgba(139, 92, 246, 0.3); }
        body.night-mode .emotion-card .emotion-name { color: #e8e8e8; }
        body.night-mode .card-back { 
            background: linear-gradient(135deg, rgba(76, 29, 149, 0.7) 0%, rgba(99, 102, 241, 0.7) 100%); 
            color: #ffffff;
        }
        body.night-mode .card-front { background: rgba(255, 255, 255, 0.1); }
        body.night-mode .card-front .story-text { color: #e8e8e8; }
        body.night-mode .card-front .challenge-text { color: #e0e0e0; }
        body.night-mode .card-front .challenge-label { color: #c0c0c0; }
        body.night-mode .card-front .social-count { color: #c0c0c0; }
        body.night-mode .card-front .social-count span { color: #e8e8e8; }
        body.night-mode .poster-card { background: rgba(255, 255, 255, 0.1); }
        body.night-mode .poster-bg { 
            background: linear-gradient(135deg, rgba(76, 29, 149, 0.7) 0%, rgba(99, 102, 241, 0.7) 100%); 
            color: #ffffff;
        }
        body.night-mode .input-field { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); color: #ffffff; }
        body.night-mode .input-field::placeholder { color: #909090; }
        body.night-mode .btn-primary { background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); }
        body.night-mode .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #ffffff; }
        body.night-mode nav { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); }
        body.night-mode .stat-item { background: rgba(255, 255, 255, 0.1); }
        body.night-mode .stat-value { color: #ffffff; }
        body.night-mode .achievement { background: rgba(255, 215, 0, 0.2); color: #ffd700; }
        body.night-mode .mood-bar { background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff); }
        body.night-mode .message-input-area { background: rgba(255, 255, 255, 0.1); }
        body.night-mode .message-input-area p { color: #e8e8e8; }
        body.night-mode .message-item { color: #c0c0c0; }
        body.night-mode .nav-text { color: #c0c0c0; }
        body.night-mode .nav-icon { color: #c0c0c0; }
        
        /* 响应式适配 - 小屏幕优化 */
        @media screen and (max-width: 375px) {
            .home-title { font-size: 26px; }
            .home-subtitle { font-size: 14px; }
            .emotion-card { padding: 20px 12px; }
            .emotion-icon { font-size: 36px; }
            .card { height: 180px; }
            .story-text { font-size: 14px; }
            .challenge-text { font-size: 13px; }
        }
        
        /* 确保卡片内容不被遮挡 */
        .card-front {
            overflow: hidden;
        }
        
        .story-text {
            word-wrap: break-word;
            word-break: break-all;
        }
    </style>
</head>

        /**
         * 数字动态滚动动画
         * @param {HTMLElement} element - 目标元素
         * @param {number} target - 目标数字
         * @param {number} duration - 动画时长（毫秒）
         */
        function animateNumber(element, target, duration = 1000) {
            const start = 0;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // 使用缓动函数
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(start + (target - start) * easeOut);
                
                element.textContent = current;
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

         * @param {string} nickname - 用户昵称
         * @returns {Object} - 身份信息对象 {nickname, parallelJob, id}
         */
        function getTodayIdentity(nickname) {
            // 从localStorage获取所有用户的身份信息（存储格式：{ "nickname1": {date, identity}, "nickname2": {...} }）
            const allIdentities = getStoredData('identityStorage', {});
            
            const today = getTodayString();
            // 使用昵称作为key，支持多个昵称独立存储
            const nicknameKey = nickname || 'anonymous';
            
            // 检查该昵称今天是否已有身份
            const storedData = allIdentities[nicknameKey];
            if (storedData && storedData.date === today) {
                // 今天已有身份，直接返回
                return storedData.identity;
            }
            
            // 生成新身份
            const randomJob = parallelJobs[Math.floor(Math.random() * parallelJobs.length)];
            const newId = Math.floor(1000 + Math.random() * 9000).toString();
            
            const newIdentity = {
                nickname: nickname,
                parallelJob: randomJob.parallelJob,
                id: newId
            };
            
            // 保存该昵称的身份信息（不影响其他昵称）
            allIdentities[nicknameKey] = {
                date: today,
                identity: newIdentity
            };
            storeData('identityStorage', allIdentities);
            
            return newIdentity;
        }

            `.replace(/\n/g, '');

        /**
         * 使用QRCode.js生成二维码图片（固定尺寸200x200）
         * @param {string} content - 二维码内容（建议使用短文本）
         * @param {string} canvasId - 目标canvas元素ID
         */
        function renderQRCode(content, canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            
            // 清空canvas
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 使用QRCode.js库生成二维码
            // 设置固定尺寸300x300，确保二维码足够大且清晰
            QRCode.toCanvas(canvas, content, {
                width: 300,  // 增加尺寸到300px，提高扫描成功率
                margin: 6,   // 增加边距
                color: {
                    dark: '#000000',  // 纯黑色
                    light: '#ffffff'  // 纯白色
                },
                errorCorrectionLevel: 'H'  // 高容错级别，确保即使部分损坏也能扫描
            }, function (error) {
                if (error) {
                    console.error('QR Code生成失败:', error);
                }
            });
        }

        /**
         * 构建身份卡展示页面的URL
         * @param {Object} identity - 身份信息
         * @returns {string} - 完整的URL地址
         */
        function buildIdentityUrl(identity) {
            // 使用GitHub Pages地址作为基础URL
            const baseUrl = 'https://sxy12345610.github.io/index.html';
            
            // 直接拼接参数，中文使用encodeURIComponent编码一次
            return `${baseUrl}?nickname=${encodeURIComponent(identity.nickname)}&id=${identity.id}&job=${encodeURIComponent(identity.parallelJob)}`;
        }

        /**
         * 生成二维码内容（使用URL格式，确保微信可识别）
         * @param {Object} identity - 身份信息
         * @returns {string} - 二维码URL内容
         */
        function generateQRContent(identity) {
            // 直接返回URL
            return buildIdentityUrl(identity);
        }

        /**
         * 显示/隐藏二维码
         * @param {Object} identity - 身份信息
         */
        function toggleQRCode(identity) {
            const qrContainer = document.getElementById('qr-container');
            
            if (!qrContainer) return;
            
            if (qrContainer.style.display === 'none' || qrContainer.style.display === '') {
                // 生成简洁的二维码内容（纯文本格式）
                const qrContent = generateQRContent(identity);
                
                // 使用QRCode.js生成二维码（固定200x200）
                renderQRCode(qrContent, 'qr-canvas');
                
                qrContainer.style.display = 'flex';
            } else {
                qrContainer.style.display = 'none';
            }
        }

        /**
         * 生成身份海报
         */

            // 获取今日身份（每天只生成一次，支持多昵称隔离）

            document.getElementById('poster-container').innerHTML = `

            // 预先生成二维码

        /**
         * 判断设备类型（手机还是电脑）
         * @returns {string} - 'mobile' 或 'desktop'
         */
        function getDeviceType() {
            const userAgent = navigator.userAgent.toLowerCase();
            const mobileKeywords = ['android', 'iphone', 'ipad', 'ipod', 'mobile', 'windows phone'];
            const isMobile = mobileKeywords.some(keyword => userAgent.includes(keyword));
            return isMobile ? 'mobile' : 'desktop';
        }

        /**
         * 显示浮层提示
         * @param {string} content - 提示内容（支持HTML）
         * @param {number} duration - 显示时长（毫秒）
         */
        function showFloatTip(content, duration = 3000) {
            // 移除已存在的浮层
            const existing = document.querySelector('.float-tip');
            if (existing) existing.remove();
            
            // 创建浮层
            const tip = document.createElement('div');
            tip.className = 'float-tip';
            tip.innerHTML = content;
            document.body.appendChild(tip);
            
            // 自动消失
            setTimeout(() => {
                tip.style.opacity = '0';
                tip.style.transition = 'opacity 0.5s ease';
                setTimeout(() => tip.remove(), 500);
            }, duration);
        }

        /**
         * 判断设备类型（手机还是电脑）
         * @returns {string} - 'mobile' 或 'desktop'
         */
        function getDeviceType() {
            const userAgent = navigator.userAgent.toLowerCase();
            const mobileKeywords = ['android', 'iphone', 'ipad', 'ipod', 'mobile', 'windows phone'];
            const isMobile = mobileKeywords.some(keyword => userAgent.includes(keyword));
            return isMobile ? 'mobile' : 'desktop';
        }

        /**
         * 保存海报到本地设备
         * - 手机端：显示浮层提示"请长按图片保存到相册"，3秒后消失
         * - 电脑端：弹出下载对话框
         */
        async function savePoster() {
            const deviceType = getDeviceType();
            
            try {
                // 获取海报元素
                const posterCard = document.getElementById('poster-card');
                if (!posterCard) {
                    throw new Error('海报元素不存在');
                }

                // 使用html2canvas将身份卡DOM转换为canvas图片
                const canvas = await html2canvas(posterCard, {
                    backgroundColor: '#ffffff',
                    scale: 2,
                    useCORS: true,
                    logging: false
                });

                // 将canvas转换为PNG图片数据
                const dataUrl = canvas.toDataURL('image/png', 1.0);

                // 创建下载链接并触发下载
                const link = document.createElement('a');
                const timestamp = new Date().getTime();
                link.download = `平行身份卡_${timestamp}.png`;
                link.href = dataUrl;
                link.click();

                // 根据设备类型显示不同提示
                if (deviceType === 'mobile') {
                    // 手机端：显示浮层提示，3秒后消失
                    showFloatTip('🎉 海报已生成，请长按图片保存到相册', 3000);
                } else {
                    // 电脑端：弹窗提示
                    alert('🎉 海报已保存，请在指定路径查看~');
                }

            } catch (error) {
                console.error('保存失败:', error);
                alert('保存失败，请尝试截图保存~');
            }
        }

        function initMessagesWall() {
            messagesWall.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const message = sampleMessages[Math.floor(Math.random() * sampleMessages.length)];
                const item = document.createElement('div');
                item.className = 'message-item';

                item.style.top = (Math.random() * 60 + 10) + '%';

        /**
         * 更新底部导航高亮状态
         */
        function updateNavHighlight() {
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('active');
            });
            const activeBtn = document.getElementById('nav-' + currentPage);
            if (activeBtn) {
                activeBtn.classList.add('active');
            }
        }

        /**
         * 生成页面标题栏（带返回按钮）
         * @param {string} title - 页面标题
         * @param {boolean} showBack - 是否显示返回按钮
         */
        function createPageHeader(title, showBack = false) {
            let html = '<div class="page-header">';
            if (showBack) {
                html += '<button class="page-header-back" onclick="goBack()">←</button>';
            }
            html += '<div class="page-header-title">' + title + '</div>';
            html += '</div>';
            return html;
        }

        function goBack() {
            // 如果底部导航被隐藏（扫码结果页），则返回首页并显示导航
            if (document.querySelector('nav').style.display === 'none') {
                document.querySelector('nav').style.display = '';
                window.location.href = 'https://sxy12345610.github.io/index.html';
                return;
            }
            if (currentPage === 'cards') {
                goToEmotionPage();
            } else if (currentPage === 'poster' || currentPage === 'stats') {
                goToHome();
            } else {
                goToHome();
            }
        }

            animatePageTransition(renderHome);

        function goToStatsPage() {

        /**
         * 页面切换动画
         * @param {function} renderFunc - 渲染函数
         */
        function animatePageTransition(renderFunc) {
            const container = document.getElementById('container');
            container.classList.add('page-transition');
            
            setTimeout(() => {
                renderFunc();
                container.classList.remove('page-transition');
            }, 250);
        }
