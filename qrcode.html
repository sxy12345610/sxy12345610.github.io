<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码访问</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fdf6e3 0%, #fce4ec 50%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #5d4e6d;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #8d7a9e;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .qrcode-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
        }
        .url-display {
            background: rgba(102, 126, 234, 0.1);
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            color: #667eea;
            word-break: break-all;
            margin-bottom: 20px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        .tips {
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 平行世界情绪驿站</h1>
        <p>扫码访问心理健康网页</p>
        
        <div class="qrcode-container">
            <div id="qrcode"></div>
        </div>
        
        <div class="url-display" id="url-display"></div>
        
        <button class="btn" onclick="copyUrl()">📋 复制链接</button>
        
        <div class="tips">
            <p>💡 使用手机微信或浏览器扫码即可访问</p>
            <p>📱 支持手机、平板、电脑多端访问</p>
        </div>
    </div>

    <script>
        // 获取当前页面URL（去掉qrcode.html部分）
        const currentUrl = window.location.href;
        const baseUrl = currentUrl.replace('qrcode.html', 'index.html');
        
        // 显示URL
        document.getElementById('url-display').textContent = baseUrl;
        
        // 生成二维码
        QRCode.toCanvas(document.getElementById('qrcode'), baseUrl, {
            width: 256,
            margin: 2,
            color: {
                dark: '#5d4e6d',
                light: '#ffffff'
            }
        }, function (error) {
            if (error) console.error(error)
        });
        
        // 复制链接
        function copyUrl() {
            navigator.clipboard.writeText(baseUrl).then(() => {
                alert('✅ 链接已复制到剪贴板');
            }).catch(err => {
                console.error('复制失败:', err);
                alert('复制失败，请手动复制');
            });
        }
    </script>
</body>
</html>
